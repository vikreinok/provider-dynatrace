apiVersion: iam.dynatrace.crossplane.io/v1alpha1
kind: PolicyBindingsV2
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/policybindingsv2
  labels:
    testing.upbound.io/example-name: acc_bindings
  name: acc-bindings
spec:
  forProvider:
    account: '########-####-####-####-############'
    groupSelector:
      matchLabels:
        testing.upbound.io/example-name: my_group
    policy:
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: acc_policy
    - idSelector:
        matchLabels:
          testing.upbound.io/example-name: acc_policy
      metadata:
        prop-b: value-c
      parameters:
        prop-b: value-b

---

apiVersion: iam.dynatrace.crossplane.io/v1alpha1
kind: Group
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/policybindingsv2
  labels:
    testing.upbound.io/example-name: my_group
  name: my-group
spec:
  forProvider:
    name: my_group
    permissions:
    - {}

---

apiVersion: iam.dynatrace.crossplane.io/v1alpha1
kind: Policy
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/policybindingsv2
  labels:
    testing.upbound.io/example-name: acc_policy
  name: acc-policy
spec:
  forProvider:
    account: '########-####-####-####-############'
    name: my_policy_valid_for_all_environments_in_this_account
    statementQuery: ALLOW settings:objects:read, settings:schemas:read WHERE settings:schemaId
      = "string";

---

apiVersion: iam.dynatrace.crossplane.io/v1alpha1
kind: Policy
metadata:
  annotations:
    meta.upbound.io/example-id: iam/v1alpha1/policybindingsv2
  labels:
    testing.upbound.io/example-name: env_policy
  name: env-policy
spec:
  forProvider:
    environment: siz654##
    name: my_policy_valid_for_environment_siz654##
    statementQuery: ALLOW settings:objects:read, settings:schemas:read WHERE settings:schemaId
      = "string";
